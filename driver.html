<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#e29ab4" />
  <title>إرسال موقع الباص</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;700;800&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: "Baloo Bhaijaan 2", system-ui, sans-serif;
      background: #e79fb8; color: #fff; min-height: 100dvh;
      display: flex; align-items: center; justify-content: center; padding: 24px; text-align: center;
    }
    .box { width: 100%; max-width: 460px; display: flex; flex-direction: column; gap: 22px; align-items: center; }
    h1 { font-size: clamp(28px, 8vw, 40px); font-weight: 800; }
    .sub { font-size: clamp(15px, 4.4vw, 19px); font-weight: 600; opacity: .95; line-height: 1.6; }
    .btn {
      border: none; border-radius: 20px; padding: 20px 28px; width: 100%;
      font-family: inherit; font-size: clamp(20px, 6vw, 26px); font-weight: 800;
      background: #fff; color: #cf789b; cursor: pointer; transition: transform .12s ease, opacity .2s;
      box-shadow: 0 10px 26px rgba(150,70,100,.25);
    }
    .btn:active { transform: scale(.97); }
    .btn.stop { background: #b0355f; color: #fff; }
    .btn:disabled { opacity: .5; }
    .status {
      background: rgba(255,255,255,.18); border: 1.5px solid rgba(255,255,255,.35);
      border-radius: 18px; padding: 18px 20px; width: 100%; font-size: clamp(15px, 4.2vw, 18px);
      font-weight: 700; line-height: 1.9;
    }
    .dot { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-inline-end: 6px; vertical-align: middle; }
    .on { background: #6dffa8; box-shadow: 0 0 10px #6dffa8; }
    .off { background: #ffd24a; }
    .err { background: #ff6b6b; }
    .mono { direction: ltr; display: inline-block; font-weight: 700; }
    .note { font-size: clamp(13px, 3.6vw, 15px); font-weight: 600; opacity: .85; line-height: 1.7; }
    .warn { background: rgba(176,53,95,.25); border-radius: 14px; padding: 12px 16px; font-size: 14px; font-weight: 700; }
  </style>
</head>
<body>
  <div class="box">
    <h1>🚌 موقع الباص</h1>
    <p class="sub">هذه الصفحة تُفتح على <b>جوال داخل الباص</b> فقط.<br>ترسل موقع الباص مباشرة للخريطة.</p>

    <button class="btn" id="toggleBtn">▶️ ابدأ إرسال الموقع</button>

    <div class="status" id="status">
      <span class="dot off"></span> غير نشط — اضغط الزر للبدء
    </div>

    <div class="warn">⚠️ خلّي الجوال <b>موصول شاحن</b> والشاشة <b>مو مقفولة</b> والصفحة مفتوحة طول الرحلة.</div>

    <p class="note">أول مرة بيطلب إذن الوصول للموقع — اضغط <b>سماح / Allow</b>.</p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="firebase-init.js?v=1"></script>
  <script src="driver.js?v=3"></script>
</body>
</html>
