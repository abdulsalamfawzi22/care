<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#e29ab4" />
  <title>موقع الباص المباشر — منافس كير</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; font-family: "Baloo Bhaijaan 2", system-ui, sans-serif; }
    body { display: flex; flex-direction: column; background: #e79fb8; }
    .topbar {
      background: #e79fb8; color: #fff; padding: 14px 18px; text-align: center;
      display: flex; flex-direction: column; gap: 8px; z-index: 500;
    }
    .topbar h1 { font-size: clamp(20px, 6vw, 28px); font-weight: 800; }
    .statusbar {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: rgba(255,255,255,.2); border-radius: 999px; padding: 8px 16px;
      font-size: clamp(13px, 4vw, 16px); font-weight: 700; margin: 0 auto;
    }
    .dot { width: 12px; height: 12px; border-radius: 50%; }
    .on { background: #35d07f; box-shadow: 0 0 10px #35d07f; }
    .off { background: #ffcf3f; }
    #map { flex: 1; width: 100%; background: #dcdcdc; }
    .bus-marker { font-size: 34px; line-height: 1; text-align: center; filter: drop-shadow(0 3px 4px rgba(0,0,0,.3)); }
    .recenter {
      position: absolute; bottom: 24px; inset-inline-start: 16px; z-index: 500;
      background: #fff; color: #cf789b; border: none; border-radius: 14px;
      padding: 12px 16px; font-family: inherit; font-weight: 800; font-size: 15px;
      box-shadow: 0 6px 16px rgba(0,0,0,.2); cursor: pointer;
    }
    .recenter:active { transform: scale(.96); }
    .gmaps {
      position: absolute; bottom: 24px; inset-inline-end: 16px; z-index: 500;
      background: #cf789b; color: #fff; border: none; border-radius: 14px;
      padding: 12px 16px; font-family: inherit; font-weight: 800; font-size: 15px;
      box-shadow: 0 6px 16px rgba(0,0,0,.2); cursor: pointer;
    }
    .gmaps:active { transform: scale(.96); }
    .leaflet-container { font-family: inherit; }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>🚌 موقع الباص المباشر</h1>
    <div class="statusbar" id="statusbar"><span class="dot off"></span> جاري الاتصال...</div>
  </div>

  <div id="map"></div>
  <button class="recenter" id="recenter">📍 توسيط على الباص</button>
  <button class="gmaps" id="gmapsBtn">🧭 التوجّه للباص</button>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <script src="firebase-init.js?v=1"></script>
  <script src="bus.js?v=2"></script>
</body>
</html>
